<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成績分佈查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --canvas:#faf9f5;--surface-card:#efe9de;--surface-dark:#181715;
  --surface-dark-el:#252320;--ink:#141413;--body:#3d3d3a;--muted:#6c6a64;
  --hairline:#e6dfd8;--coral:#cc785c;--coral-active:#a9583e;
  --teal:#5db8a6;--amber:#e8a55a;--on-dark:#faf9f5;--on-dark-soft:#a09d96;
  --r-md:8px;--r-lg:12px;--r-xl:16px;
}
body{background:var(--canvas);color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh}
.page{max-width:720px;margin:0 auto;padding:48px 20px 80px}

/* Header */
.header{text-align:center;margin-bottom:40px}
.header h1{font-family:'EB Garamond',serif;font-size:clamp(28px,5vw,42px);font-weight:400;letter-spacing:-0.5px;color:var(--ink);line-height:1.15}
.header p{margin-top:10px;font-size:14px;color:var(--muted);letter-spacing:0.3px}
.coral-dot{color:var(--coral)}

/* Search */
.search-wrap{position:relative;margin-bottom:24px}
.search-input{
  width:100%;padding:12px 16px;font-size:15px;font-family:'Inter',sans-serif;
  background:var(--canvas);color:var(--ink);border:1.5px solid var(--hairline);
  border-radius:var(--r-md);outline:none;transition:border-color .15s;
}
.search-input:focus{border-color:var(--coral)}
.search-input::placeholder{color:var(--muted)}
.dropdown{
  display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:10;
  background:var(--canvas);border:1.5px solid var(--hairline);border-radius:var(--r-md);
  max-height:260px;overflow-y:auto;box-shadow:0 4px 16px rgba(20,20,19,.1);
}
.dropdown.open{display:block}
.drop-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;cursor:pointer;transition:background .1s;font-size:14px;
}
.drop-item:hover{background:var(--surface-card)}
.drop-item .di-doc{color:var(--muted);font-size:13px;font-family:monospace}
.drop-item .di-name{font-weight:500}
.no-result{padding:12px 16px;font-size:14px;color:var(--muted);text-align:center}

/* Score Card */
.card{
  background:var(--surface-card);border-radius:var(--r-xl);padding:28px 24px 24px;
  margin-bottom:28px;opacity:0;transform:translateY(8px);
  transition:opacity .35s ease,transform .35s ease;display:none;
}
.card.visible{display:block}
.card.animated{opacity:1;transform:translateY(0)}
.card-name{font-family:'EB Garamond',serif;font-size:22px;font-weight:400;margin-bottom:4px}
.card-doc{font-size:13px;color:var(--muted);margin-bottom:20px;letter-spacing:.3px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:480px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-box{background:var(--canvas);border-radius:var(--r-lg);padding:16px 12px;text-align:center}
.stat-val{font-family:'EB Garamond',serif;font-size:26px;font-weight:400;color:var(--coral);line-height:1}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:5px;letter-spacing:.5px;text-transform:uppercase}
.stat-sub{font-size:12px;color:var(--body);margin-top:3px}

/* Chart */
.chart-wrap{
  background:var(--surface-dark);border-radius:var(--r-xl);padding:24px 20px 20px;
  position:relative;
}
.chart-title{font-family:'EB Garamond',serif;font-size:16px;color:var(--on-dark);margin-bottom:16px;font-weight:400}
canvas#chart{width:100%;display:block;border-radius:var(--r-md)}
.legend{display:flex;flex-wrap:wrap;gap:16px;margin-top:16px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--on-dark-soft)}
.leg-line{width:18px;height:2px;border-radius:2px;flex-shrink:0}
.leg-line.dashed{background:repeating-linear-gradient(90deg,currentColor 0,currentColor 4px,transparent 4px,transparent 7px)}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>成績分佈查詢<span class="coral-dot"> ·</span></h1>
    <p>共 154 位學員 &nbsp;／&nbsp; 輸入姓名或 DOC 號碼查詢個人成績</p>
  </div>

  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="輸入姓名或 DOC 號碼…" autocomplete="off">
    <div class="dropdown" id="dropdown"></div>
  </div>

  <div class="card" id="card">
    <div class="card-name" id="cardName"></div>
    <div class="card-doc" id="cardDoc"></div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-val" id="sScore">—</div>
        <div class="stat-lbl">原圖總分</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="sRank">—</div>
        <div class="stat-lbl">排名</div>
        <div class="stat-sub" id="sRankSub"></div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="sZ">—</div>
        <div class="stat-lbl">Z 值</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="sPct">—</div>
        <div class="stat-lbl">百分位</div>
        <div class="stat-sub">超越同學</div>
      </div>
    </div>
  </div>

  <div class="chart-wrap">
    <div class="chart-title">成績分佈曲線</div>
    <canvas id="chart"></canvas>
    <div class="legend" id="legend">
      <div class="leg-item"><div class="leg-line" style="background:#5db8a6"></div>平均數 (89.38)</div>
      <div class="leg-item"><div class="leg-line" style="background:#e8a55a"></div>中位數 (90.67)</div>

      <div class="leg-item" id="legStudent" style="display:none"><div class="leg-line" style="background:#cc785c"></div><span id="legStudentLabel">你的成績</span></div>
    </div>
  </div>
</div>

const S = DATA.students;
const ST = DATA.stats;
const KDE = DATA.kde;

// ---------- search ----------
const inp = document.getElementById('searchInput');
const dd  = document.getElementById('dropdown');

function filterStudents(q) {
  if (!q) return [];
  const lq = q.toLowerCase();
  return S.filter(s => s.name.includes(q) || s.doc.toLowerCase().includes(lq)).slice(0, 40);
}

function renderDropdown(list) {
  if (!list.length) {
    dd.innerHTML = '<div class="no-result">查無符合的學員</div>';
  } else {
    dd.innerHTML = list.map((s,i) =>
      `<div class="drop-item" data-i="${i}" onclick="selectStudent(${S.indexOf(s)})">
        <span class="di-name">${s.name}</span>
        <span class="di-doc">${s.doc}</span>
      </div>`
    ).join('');
  }
  dd.classList.add('open');
}

inp.addEventListener('input', () => {
  const q = inp.value.trim();
  if (!q) { dd.classList.remove('open'); return; }
  renderDropdown(filterStudents(q));
});

document.addEventListener('click', e => {
  if (!inp.contains(e.target) && !dd.contains(e.target)) dd.classList.remove('open');
});

// ---------- select student ----------
let selectedScore = null;

function selectStudent(idx) {
  const s = S[idx];
  dd.classList.remove('open');
  inp.value = s.name;

  // calc stats
  const z   = (s.score - ST.mean) / ST.std;
  const pct = Math.round(S.filter(x => x.score < s.score).length / ST.total * 100);

  document.getElementById('cardName').textContent = s.name;
  document.getElementById('cardDoc').textContent  = s.doc;

  // animated numbers
  animateNum('sScore', 0, s.score, 600, v => v.toFixed(2));
  animateNum('sRank',  0, s.rank || 0, 500, v => Math.round(v));
  document.getElementById('sRankSub').textContent = `共 ${ST.total} 人`;
  animateNum('sZ',   0, Math.abs(z), 500, v => (z >= 0 ? '+' : '-') + v.toFixed(2));
  animateNum('sPct', 0, pct, 500, v => Math.round(v) + '%');

  // show card
  const card = document.getElementById('card');
  card.style.display = 'block';
  requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('animated')));

  // show legend item
  document.getElementById('legStudent').style.display = 'flex';
  document.getElementById('legStudentLabel').textContent = s.name + ' (' + s.score.toFixed(2) + ')';

  // draw chart with student line
  selectedScore = s.score;
  drawChart(s.score);
}

function animateNum(id, from, to, dur, fmt) {
  const el = document.getElementById(id);
  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / dur, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    el.textContent = fmt(from + (to - from) * ease);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ---------- chart ----------
const canvas = document.getElementById('chart');
const DPR = window.devicePixelRatio || 1;

function setCanvasSize() {
  const w = canvas.parentElement.clientWidth - 40;
  const h = Math.max(220, Math.min(320, w * 0.42));
  canvas.width  = w * DPR;
  canvas.height = h * DPR;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
}

function drawChart(studentScore) {
  setCanvasSize();
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);
  const W = canvas.width  / DPR;
  const H = canvas.height / DPR;
  const PAD = {l:36, r:16, t:12, b:36};
  const CW = W - PAD.l - PAD.r;
  const CH = H - PAD.t - PAD.b;

  const xArr = KDE.x, yArr = KDE.y;
  const xMin = ST.lo, xMax = ST.hi;
  const yMax = Math.max(...yArr) * 1.12;

  function xp(v) { return PAD.l + (v - xMin) / (xMax - xMin) * CW; }
  function yp(v) { return PAD.t + CH - (v / yMax) * CH; }

  ctx.clearRect(0, 0, W, H);

  // ±1σ band
  const s1lo = ST.mean - ST.std, s1hi = ST.mean + ST.std;
  ctx.beginPath();
  let first1 = true;
  for (let i = 0; i < xArr.length; i++) {
    if (xArr[i] < s1lo || xArr[i] > s1hi) continue;
    if (first1) { ctx.moveTo(xp(xArr[i]), yp(yArr[i])); first1 = false; }
    else ctx.lineTo(xp(xArr[i]), yp(yArr[i]));
  }
  ctx.lineTo(xp(s1hi), yp(0));
  ctx.lineTo(xp(s1lo), yp(0));
  ctx.closePath();
  ctx.fillStyle = 'rgba(204,120,92,0.18)';
  ctx.fill();

  // KDE curve (animate)
  let animPhase = 0;
  const totalPts = xArr.length;

  function frame() {
    ctx.clearRect(0, 0, W, H);

    // ±1σ band (redraw each frame)
    ctx.beginPath();
    let f1 = true;
    for (let i = 0; i < xArr.length; i++) {
      if (xArr[i] < s1lo || xArr[i] > s1hi) continue;
      if (f1) { ctx.moveTo(xp(xArr[i]), yp(yArr[i])); f1 = false; }
      else ctx.lineTo(xp(xArr[i]), yp(yArr[i]));
    }
    ctx.lineTo(xp(s1hi), yp(0)); ctx.lineTo(xp(s1lo), yp(0)); ctx.closePath();
    ctx.fillStyle = 'rgba(204,120,92,0.18)'; ctx.fill();

    // curve up to animPhase
    const lim = Math.floor(animPhase * totalPts);
    if (lim > 1) {
      // fill under curve
      ctx.beginPath();
      ctx.moveTo(xp(xArr[0]), yp(0));
      for (let i = 0; i < lim; i++) ctx.lineTo(xp(xArr[i]), yp(yArr[i]));
      ctx.lineTo(xp(xArr[lim-1]), yp(0));
      ctx.closePath();
      const grad = ctx.createLinearGradient(0, PAD.t, 0, PAD.t + CH);
      grad.addColorStop(0,   'rgba(204,120,92,0.25)');
      grad.addColorStop(1,   'rgba(204,120,92,0.02)');
      ctx.fillStyle = grad; ctx.fill();

      // curve line
      ctx.beginPath();
      ctx.moveTo(xp(xArr[0]), yp(yArr[0]));
      for (let i = 1; i < lim; i++) ctx.lineTo(xp(xArr[i]), yp(yArr[i]));
      ctx.strokeStyle = 'rgba(204,120,92,0.7)'; ctx.lineWidth = 2;
      ctx.lineJoin = 'round'; ctx.stroke();
    }

    // x axis
    ctx.strokeStyle = 'rgba(250,249,245,.12)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD.l, PAD.t + CH); ctx.lineTo(PAD.l + CW, PAD.t + CH); ctx.stroke();

    // x labels
    ctx.fillStyle = '#a09d96'; ctx.font = '11px Inter,sans-serif'; ctx.textAlign = 'center';
    const step = Math.ceil((xMax - xMin) / 8);
    for (let v = Math.ceil(xMin); v <= xMax; v += step) {
      ctx.fillText(v.toFixed(0), xp(v), H - 6);
      ctx.strokeStyle = 'rgba(250,249,245,.06)'; ctx.lineWidth = .5;
      ctx.beginPath(); ctx.moveTo(xp(v), PAD.t); ctx.lineTo(xp(v), PAD.t + CH); ctx.stroke();
    }

    // mean line
    drawVLine(ctx, xp(ST.mean), PAD.t, PAD.t+CH, '#5db8a6', 1.5, [5,4]);
    // median line
    drawVLine(ctx, xp(ST.median), PAD.t, PAD.t+CH, '#e8a55a', 1.5, [5,4]);

    // student line — always drawn last (on top), visible from start
    if (studentScore !== null) {
      const sx = xp(studentScore);
      // glow
      ctx.save();
      ctx.shadowColor = '#cc785c'; ctx.shadowBlur = 8;
      drawVLine(ctx, sx, PAD.t, PAD.t+CH, '#cc785c', 3, null);
      ctx.restore();
      // label above line
      ctx.fillStyle = '#cc785c';
      ctx.font = '500 11px Inter,sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('▼', sx, PAD.t + 10);
    }

    if (animPhase < 1) {
      animPhase += 0.025;
      requestAnimationFrame(frame);
    } else {
      animPhase = 1;
    }
  }

  animPhase = 0;
  requestAnimationFrame(frame);
}

function drawVLine(ctx, x, y1, y2, color, width, dash) {
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = width;
  if (dash) ctx.setLineDash(dash); else ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(x, y1); ctx.lineTo(x, y2); ctx.stroke();
  ctx.restore();
}

// initial chart (no student)
window.addEventListener('load', () => drawChart(null));
window.addEventListener('resize', () => drawChart(selectedScore));
</script>
